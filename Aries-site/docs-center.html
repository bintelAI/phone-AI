<!DOCTYPE html>
<html lang="zh-CN" class="scroll-smooth dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aries AI 文档中心</title>
  <link rel="icon" type="image/png" href="./assets/brand-mark-color.png?v=5">
  <link rel="apple-touch-icon" href="./assets/brand-mark-color.png?v=5">
  <link rel="preconnect" href="https://fonts.font.im">
  <link rel="preconnect" href="https://fonts.gstatic.font.im" crossorigin>
  <link rel="dns-prefetch" href="//fonts.font.im">
  <link rel="dns-prefetch" href="//fonts.gstatic.font.im">
  <link rel="dns-prefetch" href="//cdn.jsdelivr.net">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          animation: {
            'ring-flow': 'ringFlow 4.5s linear infinite',
            'ring-pulse': 'ringPulse 2.8s ease-in-out infinite',
          },
          keyframes: {
            ringFlow: {
              '0%': { transform: 'rotate(0deg)' },
              '100%': { transform: 'rotate(360deg)' },
            },
            ringPulse: {
              '0%, 100%': { opacity: '0.55' },
              '50%': { opacity: '0.95' },
            },
          },
        },
      },
    }
  </script>
  <style>
    body {
      font-family: 'Inter', sans-serif;
      overflow-x: hidden;
      min-height: 100vh;
    }

    html,
    body {
      height: 100%;
      overflow: hidden;
    }

    /* 亮色模式基础文本颜色 */
    html.light body,
    html.light {
      color: #0f172a !important;
    }

    html.light * {
      color: inherit;
    }

    .brand-mark {
      display: block;
      object-fit: contain;
      flex-shrink: 0;
      transition: filter 0.3s ease, opacity 0.3s ease;
    }

    html.dark .brand-mark {
      filter: none;
    }

    html.light .brand-mark {
      filter: brightness(0) saturate(100%);
    }

    .scrollbar-visible {
      scrollbar-width: thin;
    }

    .scrollbar-visible::-webkit-scrollbar {
      width: 10px;
      height: 10px;
    }

    .scrollbar-visible::-webkit-scrollbar-track {
      background: transparent;
    }

    .scrollbar-visible::-webkit-scrollbar-thumb {
      border-radius: 9999px;
      background: rgba(255, 255, 255, 0.22);
      border: 2px solid rgba(0, 0, 0, 0.15);
    }

    html.dark .scrollbar-visible::-webkit-scrollbar {
      width: 10px;
      height: 10px;
    }

    html.dark .scrollbar-visible::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.04);
      border-radius: 9999px;
    }

    html.dark .scrollbar-visible::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.14);
      border: 2px solid rgba(0, 0, 0, 0.26);
      box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.06) inset;
    }

    html.dark .scrollbar-visible::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.20);
    }

    html.dark .scrollbar-visible {
      scrollbar-color: rgba(255, 255, 255, 0.22) rgba(255, 255, 255, 0.06);
      scrollbar-width: thin;
    }

    html.light .scrollbar-visible::-webkit-scrollbar-thumb {
      background: rgba(15, 23, 42, 0.18);
      border-color: rgba(255, 255, 255, 0.65);
    }

    .scrollbar-visible::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.32);
    }

    html.light .scrollbar-visible::-webkit-scrollbar-thumb:hover {
      background: rgba(15, 23, 42, 0.26);
    }

    .bg-grid {
      background-image:
        radial-gradient(circle at 1px 1px, rgba(255, 255, 255, 0.06) 1px, transparent 0);
      background-size: 22px 22px;
    }

    html.dark .page-bg {
      background: radial-gradient(1200px 600px at 50% 20%, rgba(88, 28, 135, 0.35), transparent 60%),
        radial-gradient(900px 500px at 15% 35%, rgba(30, 64, 175, 0.35), transparent 55%),
        radial-gradient(900px 500px at 85% 55%, rgba(190, 24, 93, 0.25), transparent 60%),
        radial-gradient(circle at center, #0a0a12 0%, #000000 100%);
    }

    .constellation-layer {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      opacity: 0;
      transition: opacity .35s ease;
    }

    html.dark .constellation-layer {
      opacity: 1;
    }

    html.light .page-bg {
      background: radial-gradient(900px 520px at 50% 10%, rgba(37, 99, 235, 0.18), transparent 58%),
        radial-gradient(980px 560px at 20% 45%, rgba(124, 58, 237, 0.16), transparent 60%),
        radial-gradient(900px 520px at 85% 35%, rgba(219, 39, 119, 0.10), transparent 62%),
        #eef2ff;
    }

    html.light .constellation-layer {
      opacity: 0;
    }

    html.light #meteor-canvas {
      opacity: 0;
    }

    html.light .brand-icon {
      background: rgba(255, 255, 255, 0.92);
      color: #0f172a;
      border: 1px solid rgba(15, 23, 42, 0.14);
      box-shadow: 0 12px 28px rgba(15, 23, 42, 0.10);
    }

    .glass {
      backdrop-filter: blur(26px);
      -webkit-backdrop-filter: blur(26px);
      border-radius: 16px;
      position: relative;
      overflow: hidden;
      isolation: isolate;
    }

    .glass::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(900px 260px at 20% 0%, rgba(255, 255, 255, 0.16), transparent 60%),
        radial-gradient(700px 240px at 85% 20%, rgba(255, 255, 255, 0.10), transparent 62%);
      opacity: 0.65;
      pointer-events: none;
      z-index: 0;
    }

    .glass::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(circle at 2px 2px, rgba(255, 255, 255, 0.10) 1px, transparent 0);
      background-size: 18px 18px;
      opacity: 0.08;
      mix-blend-mode: overlay;
      pointer-events: none;
      z-index: 0;
    }

    html.light .glass::after {
      opacity: 0.04;
    }

    .glass-card {
      position: relative;
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border-radius: 1rem;
      transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94), box-shadow 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94), background-color 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94), border-color 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      overflow: hidden;
      z-index: 1;
      transform: translateZ(0);
      backface-visibility: hidden;
    }

    html.dark .glass-card {
      background: rgba(30, 30, 40, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    html.light .glass-card {
      background: rgba(255, 255, 255, 0.78);
      border: 1px solid rgba(15, 23, 42, 0.10);
      box-shadow: 0 18px 60px rgba(15, 23, 42, 0.08);
    }

    .glass-card:hover {
      transform: translateY(-4px) scale(1.002);
    }

    html.dark .glass-card:hover {
      background: rgba(40, 40, 55, 0.6);
      border-color: rgba(255, 255, 255, 0.2);
      box-shadow: 0 15px 45px rgba(0, 0, 0, 0.6);
    }

    html.light .glass-card:hover {
      background: rgba(255, 255, 255, 0.95);
      border-color: rgba(59, 130, 246, 0.3);
      box-shadow: 0 15px 45px rgba(59, 130, 246, 0.1);
    }

    .glass-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(120deg, transparent 30%, rgba(255, 255, 255, 0.08) 50%, transparent 70%);
      transform: translateX(-100%);
      transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 2;
      pointer-events: none;
    }

    .glass-card:hover::before {
      transform: translateX(100%);
      transition: transform 0.8s ease-in-out;
    }

    .theme-toggle {
      cursor: pointer;
      width: 52px;
      height: 28px;
      border-radius: 50px;
      position: relative;
      display: flex;
      align-items: center;
      padding: 3px;
      transition: all 0.3s;
    }

    html.dark .theme-toggle {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    html.light .theme-toggle {
      background: #e2e8f0;
      border: 1px solid #cbd5e1;
    }

    .toggle-dot {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      transition: all 0.4s cubic-bezier(0.4, 0.0, 0.2, 1);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
    }

    html.dark .toggle-dot {
      transform: translateX(24px);
      background: #3b82f6;
      color: white;
    }

    html.light .toggle-dot {
      transform: translateX(0);
      background: #ffffff;
      color: #f59e0b;
    }

    html.dark .glass {
      /* Mobile optimization: increased opacity for better readability */
      background: rgba(10, 10, 16, 0.45);
      border: 1px solid rgba(255, 255, 255, 0.18);
      box-shadow:
        0 12px 36px rgba(0, 0, 0, 0.32),
        0 0 0 1px rgba(255, 255, 255, 0.08) inset;
      backdrop-filter: blur(40px);
      -webkit-backdrop-filter: blur(40px);
    }

    /* Mobile Text & Readability Optimization */
    @media (max-width: 640px) {

      .doc-prose {
        font-size: 0.875rem !important;
        line-height: 1.7 !important;
      }

      .doc-prose p,
      .doc-prose li {
        color: rgba(255, 255, 255, 0.95) !important;
      }

      .doc-prose h1 {
        font-size: 1.35rem !important;
        margin-bottom: 1.25rem !important;
      }

      .doc-prose h2 {
        font-size: 1.1rem !important;
        margin-top: 1.75rem !important;
        color: #fff !important;
      }

      .doc-prose h3 {
        font-size: 1rem !important;
      }

      .glass {
        padding: 1rem !important;
      }

      .glass.p-8,
      .glass.p-10 {
        padding: 1rem !important;
      }

      #doc-content {
        padding-right: 0.5rem !important;
      }

      .md-content pre {
        font-size: 0.8rem !important;
        padding: 0.75rem !important;
      }

      .doc-card {
        padding: 1rem !important;
        min-height: 100px !important;
      }

      .doc-icon {
        width: 40px !important;
        height: 40px !important;
      }

      /* 亮色模式下的文本优化 */
      html.light .doc-prose p,
      html.light .doc-prose li,
      html.light .md-content p,
      html.light .md-content li {
        color: #1e293b !important;
      }

      html.light .doc-prose h1,
      html.light .doc-prose h2,
      html.light .doc-prose h3,
      html.light .md-content h1,
      html.light .md-content h2,
      html.light .md-content h3 {
        color: #0f172a !important;
      }

      /* 导航项优化 */
      .nav-item {
        padding: 0.75rem 1rem !important;
        font-size: 0.9rem !important;
      }

      /* 文档卡片优化 */
      .doc-card .text-sm {
        font-size: 0.95rem !important;
      }

      .doc-card .text-xs {
        font-size: 0.85rem !important;
      }

      /* 顶部栏优化 */
      .max-w-screen-2xl {
        padding-top: 0.5rem !important;
      }

      /* 主内容区域优化 */
      main .glass {
        padding: 1.25rem !important;
      }
    }

    /* 更小屏幕优化 */
    @media (max-width: 480px) {
      .doc-prose h1 {
        font-size: 1.2rem !important;
      }

      .doc-prose h2 {
        font-size: 1rem !important;
      }

      .doc-card {
        padding: 0.875rem !important;
        min-height: 90px !important;
      }

      .doc-icon {
        width: 36px !important;
        height: 36px !important;
      }

      main .glass {
        padding: 1rem !important;
      }

      /* 移动端 Markdown 优化 */
      .md-content pre {
        padding: 12px 14px !important;
        font-size: 0.8rem !important;
      }

      .md-content table {
        font-size: 0.8rem !important;
        min-width: 400px !important;
      }

      .md-content th,
      .md-content td {
        padding: 8px 10px !important;
      }

      .table-wrap {
        border-radius: 8px !important;
      }
    }

    /* 电脑端 Markdown 优化 */
    @media (min-width: 1024px) {
      .md-content pre {
        padding: 20px 24px !important;
        font-size: 0.9rem !important;
      }

      .md-content table {
        font-size: 0.95rem !important;
      }

      .md-content th,
      .md-content td {
        padding: 14px 18px !important;
      }

      .doc-prose h1 {
        font-size: 1.8rem !important;
      }

      .doc-prose h2 {
        font-size: 1.3rem !important;
      }

      .doc-prose p,
      .doc-prose li {
        font-size: 1rem !important;
        line-height: 1.8 !important;
      }
    }

    /* 亮色模式全面文本优化 */
    html.light,
    html.light body,
    html.light .doc-prose,
    html.light .doc-prose p,
    html.light .doc-prose li,
    html.light .doc-prose h1,
    html.light .doc-prose h2,
    html.light .doc-prose h3,
    html.light .doc-prose h4,
    html.light .doc-prose h5,
    html.light .doc-prose h6,
    html.light .md-content,
    html.light .md-content p,
    html.light .md-content li,
    html.light .md-content h1,
    html.light .md-content h2,
    html.light .md-content h3,
    html.light .md-content h4,
    html.light .md-content h5,
    html.light .md-content h6,
    html.light .nav-item,
    html.light #mobile-doc-nav a,
    html.light #doc-nav a,
    html.light .text-slate-900,
    html.light .text-slate-800,
    html.light .text-slate-700,
    html.light .text-slate-600,
    html.light .text-slate-500 {
      color: #0f172a !important;
    }

    html.light .doc-prose code,
    html.light .md-content code {
      color: #0f172a !important;
      background: rgba(15, 23, 42, 0.08) !important;
      border-color: rgba(15, 23, 42, 0.12) !important;
    }

    html.light .doc-prose th,
    html.light .doc-prose td,
    html.light .md-content th,
    html.light .md-content td {
      color: #0f172a !important;
    }

    html.light .glass {
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid rgba(15, 23, 42, 0.10);
      box-shadow:
        0 16px 46px rgba(15, 23, 42, 0.10),
        0 0 0 1px rgba(15, 23, 42, 0.04) inset;
    }

    html.dark .doc-card,
    html.dark pre.doc-md,
    html.dark .doc-accordion {
      background: rgba(10, 10, 16, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.18);
      box-shadow:
        0 12px 36px rgba(0, 0, 0, 0.32),
        0 0 0 1px rgba(255, 255, 255, 0.08) inset;
    }

    html.light .doc-card,
    html.light pre.doc-md,
    html.light .doc-accordion {
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid rgba(15, 23, 42, 0.10);
      box-shadow:
        0 16px 46px rgba(15, 23, 42, 0.10),
        0 0 0 1px rgba(15, 23, 42, 0.04) inset;
    }

    .glass>* {
      position: relative;
      z-index: 1;
    }

    .nav-item {
      border-radius: 10px;
      transition: background-color .2s ease, color .2s ease;
    }

    html.dark .nav-item:hover {
      background: rgba(255, 255, 255, 0.06);
    }

    html.light .nav-item:hover {
      background: rgba(0, 0, 0, 0.04);
    }

    .capsule {
      position: relative;
      border-radius: 9999px;
      overflow: hidden;
      isolation: isolate;
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    html.dark .capsule {
      outline: none;
    }

    .capsule::before {
      content: '';
      position: absolute;
      inset: -3px;
      border-radius: inherit;
      background: conic-gradient(from 180deg, rgba(96, 165, 250, 0.0), rgba(96, 165, 250, 0.95), rgba(192, 132, 252, 0.95), rgba(244, 114, 182, 0.95), rgba(96, 165, 250, 0.0));
      filter: blur(10px);
      opacity: 0.55;
      animation: ringFlow 4.5s linear infinite;
      z-index: -2;
    }

    .capsule::after {
      content: '';
      position: absolute;
      inset: 1px;
      border-radius: inherit;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.22);
      box-shadow:
        0 10px 30px rgba(0, 0, 0, 0.26),
        0 0 0 1px rgba(255, 255, 255, 0.10) inset;
      z-index: -1;
      transition: background-color .25s ease;
    }

    html.dark .capsule::after {
      background:
        radial-gradient(900px 240px at 20% 0%, rgba(255, 255, 255, 0.12), transparent 62%),
        radial-gradient(700px 240px at 85% 20%, rgba(255, 255, 255, 0.10), transparent 64%),
        radial-gradient(900px 300px at 50% 120%, rgba(56, 189, 248, 0.08), transparent 60%),
        rgba(255, 255, 255, 0.06);
      border-color: rgba(255, 255, 255, 0.12);
      box-shadow:
        0 10px 26px rgba(0, 0, 0, 0.16),
        0 0 0 1px rgba(255, 255, 255, 0.08) inset;
    }

    html.dark button.capsule,
    html.dark a.capsule {
      background: transparent !important;
    }

    html.dark button.capsule:hover,
    html.dark a.capsule:hover {
      filter: brightness(1.06);
    }

    html.light .capsule::after {
      background: rgba(255, 255, 255, 0.82);
      border-color: rgba(15, 23, 42, 0.10);
      box-shadow:
        0 16px 42px rgba(15, 23, 42, 0.12),
        0 0 0 1px rgba(15, 23, 42, 0.04) inset;
    }

    .capsule:hover::before {
      opacity: 0.95;
      animation-duration: 3.5s;
    }

    .capsule:hover {
      transform: translateY(-1px);
      box-shadow: 0 0 36px rgba(96, 165, 250, 0.15);
    }

    .hero-pill {
      box-shadow:
        0 18px 60px rgba(0, 0, 0, 0.35),
        0 0 0 1px rgba(255, 255, 255, 0.06) inset;
    }

    html.light .hero-pill {
      box-shadow:
        0 16px 46px rgba(15, 23, 42, 0.10),
        0 0 0 1px rgba(15, 23, 42, 0.06) inset;
    }

    .doc-card {
      position: relative;
      overflow: hidden;
      border-radius: 16px;
      transition: transform .25s ease, box-shadow .25s ease, border-color .25s ease, background-color .25s ease;
      min-height: 116px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid rgba(15, 23, 42, 0.10);
      box-shadow:
        0 16px 46px rgba(15, 23, 42, 0.10),
        0 0 0 1px rgba(15, 23, 42, 0.04) inset;
    }

    .doc-icon {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.12);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
      flex-shrink: 0;
    }

    html.light .doc-icon {
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid rgba(15, 23, 42, 0.10);
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.10);
    }

    .doc-card::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background:
        radial-gradient(800px 220px at 15% 0%, rgba(255, 255, 255, 0.15), transparent 60%),
        radial-gradient(600px 200px at 85% 15%, rgba(255, 255, 255, 0.10), transparent 62%);
      opacity: 0.7;
      pointer-events: none;
      z-index: 0;
    }

    .doc-card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background-image:
        radial-gradient(circle at 2px 2px, rgba(255, 255, 255, 0.10) 1px, transparent 0);
      background-size: 18px 18px;
      opacity: 0.07;
      mix-blend-mode: overlay;
      pointer-events: none;
      z-index: 0;
    }

    .doc-card>* {
      position: relative;
      z-index: 1;
    }

    html.dark .doc-card {
      background: rgba(18, 18, 24, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.20);
      backdrop-filter: blur(26px);
      -webkit-backdrop-filter: blur(26px);
      box-shadow:
        0 12px 36px rgba(0, 0, 0, 0.30),
        0 0 0 1px rgba(255, 255, 255, 0.08) inset;
    }

    html.light .doc-card {
      background: rgba(255, 255, 255, 0.66);
      border: 1px solid rgba(15, 23, 42, 0.10);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      box-shadow:
        0 10px 28px rgba(15, 23, 42, 0.10),
        0 0 0 1px rgba(15, 23, 42, 0.04) inset;
    }

    .doc-card:hover {
      transform: translateY(-3px);
    }

    html.dark .doc-card:hover {
      border-color: rgba(255, 255, 255, 0.20);
      box-shadow:
        0 18px 58px rgba(0, 0, 0, 0.62),
        0 0 0 1px rgba(255, 255, 255, 0.07) inset;
      background: rgba(18, 18, 24, 0.26);
    }

    html.light .doc-card:hover {
      border-color: rgba(37, 99, 235, 0.25);
      box-shadow:
        0 16px 44px rgba(37, 99, 235, 0.14),
        0 0 0 1px rgba(37, 99, 235, 0.06) inset;
    }

    .doc-card .shine {
      position: absolute;
      top: 0;
      left: -120%;
      width: 80%;
      height: 100%;

  <script>
    (function initDocsCenter() {
      const contentEl = document.getElementById('doc-content');
      const navEl = document.getElementById('doc-nav');
      const langBtn = document.getElementById('lang-toggle');
      const langLabel = document.getElementById('lang-label');
      const lightbox = document.getElementById('lightbox');
      const lightboxImg = document.getElementById('lightbox-img');
      const lightboxClose = document.getElementById('lightbox-close');

      if (!contentEl || !navEl) return;

      let lang = localStorage.getItem('docs_lang') || 'CN';
      function setLang(next) {
        lang = next;
        localStorage.setItem('docs_lang', lang);
        if (langLabel) langLabel.textContent = lang;
        render();
      }
      if (langBtn) langBtn.addEventListener('click', () => setLang(lang === 'CN' ? 'EN' : 'CN'));
      if (langLabel) langLabel.textContent = lang;

      function escapeHtml(str) {
        return String(str)
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;')
          .replaceAll("'", '&#039;');
      }

      function isExternalHref(href) {
        if (!href) return false;
        if (href.startsWith('#')) return false;
        if (href.startsWith('/')) return false;
        try {
          const u = new URL(href, location.href);
          return u.origin !== location.origin;
        } catch {
          return false;
        }
      }

      function postProcessMarkdown(rootEl) {
        if (!rootEl) return;

        rootEl.querySelectorAll('a[href]').forEach((a) => {
          const href = a.getAttribute('href') || '';
          if (isExternalHref(href)) {
            a.setAttribute('target', '_blank');
            a.setAttribute('rel', 'noreferrer');
          }
        });

        rootEl.querySelectorAll('table').forEach((tbl) => {
          if (tbl.parentElement && tbl.parentElement.classList.contains('table-wrap')) return;
          const wrap = document.createElement('div');
          wrap.className = 'table-wrap scrollbar-visible';
          wrap.style.overflowX = 'auto';
          wrap.style.marginTop = '0.9rem';
          tbl.parentNode.insertBefore(wrap, tbl);
          wrap.appendChild(tbl);
        });
      }

      if (window.marked && typeof window.marked.setOptions === 'function') {
        window.marked.setOptions({
          gfm: true,
          tables: true,
          breaks: false,
          mangle: false,
          headerIds: false,
        });
      }

      function openLightbox(src, alt) {
        if (!lightbox || !lightboxImg) return;
        lightboxImg.src = src;
        lightboxImg.alt = alt || '';
        lightbox.classList.add('show');
        lightbox.setAttribute('aria-hidden', 'false');
      }

      function closeLightbox() {
        if (!lightbox || !lightboxImg) return;
        lightbox.classList.remove('show');
        lightbox.setAttribute('aria-hidden', 'true');
        lightboxImg.src = '';
        lightboxImg.alt = '';
      }

      if (lightbox) {
        lightbox.addEventListener('click', (e) => {
          const t = e.target;
          if (t && t.classList && t.classList.contains('overlay')) closeLightbox();
        });
      }
      if (lightboxClose) lightboxClose.addEventListener('click', closeLightbox);
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') closeLightbox();
      });

      const IMG_MAP = {
        'quick-5min': { download: '', accessibility: '', overlay: '' },
        'automation-permissions': { accessibility: '', screenshot: '', overlay: '' },
      };

      async function loadDocText(docName) {
        // 尝试加载文档
        // 如果通过 file:// 协议访问，提示需要本地服务
        if (location.protocol === 'file:') {
          // 仅为了开发方便，允许 file:// 协议下尝试相对路径，但也提示警告
          console.warn('正在使用 file:// 协议访问，部分功能可能受限');
        }

        const baseDir = location.pathname.replace(/[^/]+$/, '');
        const fileName = `${encodeURIComponent(docName)}.md`;
        const cacheBuster = `v=${Date.now()}`;
        // 优化路径猜测顺序：优先尝试 docs/ 下
        const candidates = [
          `docs/${fileName}?${cacheBuster}`,
          // 针对 URL 重写或子目录部署的情况
          `${baseDir}docs/${fileName}?${cacheBuster}`
        ];

        let lastErr = null;
        for (const url of candidates) {
          try {
            const res = await fetch(url, { cache: 'no-store' });
            if (!res.ok) {
              // 如果是 404，尝试下一个
              lastErr = new Error(`Failed to load ${url}: ${res.status}`);
              continue;
            }
            return await res.text();
          } catch (e) {
            lastErr = e;
          }
        }

        throw lastErr || new Error('Failed to fetch doc content');
      }

      function docPage(titleCn, titleEn, docName) {
        return `
          <div class="doc-page">
            <div class="doc-prose">
              <h1>${lang === 'CN' ? escapeHtml(titleCn) : escapeHtml(titleEn)}</h1>
              <div class="md-content" data-doc="${escapeHtml(docName)}"></div>
            </div>
            <div class="doc-page-footer">
              <div class="text-center text-xs dark:text-slate-400 text-slate-500">关于：本页内容来自仓库文档，随项目更新。若发现不一致，请在 GitHub 提交 Issue/PR。</div>
            </div>
          </div>
        `;
      }

      function imgSlot(pageId, key, title) {
        const src = (IMG_MAP[pageId] && IMG_MAP[pageId][key]) ? IMG_MAP[pageId][key] : '';
        const label = title || ('图片占位：' + key);
        if (!src) {
          return `
            <div class="img-slot px-4 py-4 mt-3" data-img-src="">
              <div class="text-sm font-semibold">${escapeHtml(label)}</div>
              <div class="mt-1 text-xs dark:text-slate-400 text-slate-600">点击占位块（后续替换为你上传的截图，并支持点击放大）</div>
            </div>
          `;
        }
        return `
          <div class="img-slot p-3 mt-3" data-img-src="${escapeHtml(src)}" data-img-alt="${escapeHtml(label)}">
            <div class="text-xs dark:text-slate-300 text-slate-600 mb-2">${escapeHtml(label)}（点击查看大图）</div>
            <img src="${escapeHtml(src)}" alt="${escapeHtml(label)}" loading="lazy" decoding="async" class="w-full rounded-xl" />
          </div>
        `;
      }

      const NAV = [
        {
          title: { CN: '欢迎', EN: 'Welcome' },
          items: [{ id: 'home', title: { CN: '文档中心首页', EN: 'Home' } }]

        {
          title: { CN: '技术文档', EN: 'Technical Docs' },
          items: [
            { id: 'doc-technical', title: { CN: '技术概览（TECHNICAL_OVERVIEW）', EN: 'Technical Overview' } },
          ]
        },
        {
          title: { CN: '开发与共创', EN: 'Co-Create' },
          items: [
            { id: 'doc-building', title: { CN: '构建指南（BUILDING）', EN: 'Building Guide' } },
            { id: 'doc-workflow', title: { CN: '工作流（GIT_WORKFLOW）', EN: 'Git Workflow' } },
            { id: 'doc-standards', title: { CN: '代码规范（CODING_STANDARDS）', EN: 'Coding Standards' } },
            { id: 'doc-feishu', title: { CN: '飞书协作（FEISHU）', EN: 'Feishu Collaboration' } },
          ]

        {
          title: { CN: '常见问题 Q&A', EN: 'Q&A' },
          items: [{ id: 'faq', title: { CN: '常见问题 Q&A', EN: 'FAQ' } }]

      ];

      function buildNav() {
        const html = NAV.map(group => {
          const title = lang === 'CN' ? group.title.CN : group.title.EN;
          const links = group.items.map(it => {
            const itTitle = lang === 'CN' ? it.title.CN : it.title.EN;
            return `<a class="nav-item block px-3 py-2 dark:text-slate-200 text-slate-700 hover:bg-black/5 dark:hover:bg-white/5 rounded-md" href="#/${escapeHtml(it.id)}">${escapeHtml(itTitle)}</a>`;
          }).join('');
          return `
            <div class="mb-4">
              <div class="text-xs font-bold dark:text-slate-400 text-slate-500 mb-2 px-3">${escapeHtml(title)}</div>
              <div class="space-y-1">${links}</div>

          `;
        }).join('') + `
          <div class="pt-4 border-t dark:border-white/10 border-black/10 mt-4">
            <div class="text-xs font-bold dark:text-slate-400 text-slate-500 mb-2 px-3">${lang === 'CN' ? '外部链接' : 'Links'}</div>
            <a class="nav-item block px-3 py-2 dark:text-slate-200 text-slate-700 hover:bg-black/5 dark:hover:bg-white/5 rounded-md" href="https://github.com/ZG0704666/Aries-AI" target="_blank" rel="noreferrer">GitHub</a>
            <a class="nav-item block px-3 py-2 dark:text-slate-200 text-slate-700 hover:bg-black/5 dark:hover:bg-white/5 rounded-md" href="https://github.com/ZG0704666/Aries-AI/releases" target="_blank" rel="noreferrer">Releases</a>

        `;
        navEl.innerHTML = html;

        const mobileNavEl = document.getElementById('mobile-doc-nav');
        if (mobileNavEl) {
          mobileNavEl.innerHTML = html;
          mobileNavEl.querySelectorAll('a').forEach(a => {
            a.addEventListener('click', () => {
              if (window.toggleDocSidebar) window.toggleDocSidebar();
            });
          });
        }
      }

      const PAGES = {
        home: () => {
          return `
            <div class="doc-prose">

                <div class="mt-4 text-sm sm:text-base dark:text-slate-300 text-slate-600 leading-relaxed max-w-4xl mx-auto">
                  ${lang === 'CN'
              ? 'Aries AI 是一款“手机上的智能执行助手（Phone Agent）”：你用自然语言下达目标，它能在真实 App 里理解界面并自动完成点击、输入、滑动等操作。'
              : 'Aries AI is a mobile Phone Agent that understands UI and executes real app interactions from natural language goals.'}
                </div>
              </div>
              <h2>${lang === 'CN' ? '三步上手' : 'Get started in 3 steps'}</h2>
              <ol class="mt-3 space-y-2" style="list-style: decimal; padding-left: 1.25rem;">
                <li>${lang === 'CN' ? '安装：下载并安装最新 APK。' : 'Install: download and install the latest APK.'}</li>
                <li>${lang === 'CN' ? '授权：开启无障碍（必须），悬浮窗（推荐），截图（按需）。' : 'Permissions: accessibility (required), overlay (recommended), screenshots (optional).'}</li>
                <li>${lang === 'CN' ? '第一次任务：输入一句话任务并观察悬浮窗日志。' : 'First task: run a one-sentence task and watch overlay logs.'}</li>
              </ol>
              <div class="mt-6 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5">
                <a class="doc-card p-5" href="#/quick-5min"><div class="shine"></div><div class="text-sm font-semibold">${lang === 'CN' ? '快速开始' : 'Quick Start'}</div><div class="mt-1 text-xs dark:text-slate-400 text-slate-500">${lang === 'CN' ? '从安装到跑通一个任务。' : 'Install and complete a first task.'}</div></a>
                <a class="doc-card p-5" href="#/doc-technical"><div class="shine"></div><div class="text-sm font-semibold">${lang === 'CN' ? '技术文档' : 'Technical Docs'}</div><div class="mt-1 text-xs dark:text-slate-400 text-slate-500">${lang === 'CN' ? '核心技术实现与架构设计。' : 'Core technology and architecture.'}</div></a>
                <a class="doc-card p-5" href="#/faq"><div class="shine"></div><div class="text-sm font-semibold">${lang === 'CN' ? '常见问题 Q&A' : 'Q&A'}</div><div class="mt-1 text-xs dark:text-slate-400 text-slate-500">${lang === 'CN' ? '集中收录典型问题与解决方案。' : 'Common questions & answers.'}</div></a>
                <a class="doc-card p-5" href="#/doc-building"><div class="shine"></div><div class="text-sm font-semibold">${lang === 'CN' ? '构建指南' : 'Building Guide'}</div><div class="mt-1 text-xs dark:text-slate-400 text-slate-500">${lang === 'CN' ? '从源码编译到打包发布。' : 'Build from source to release.'}</div></a>
                <a class="doc-card p-5" href="#/doc-workflow"><div class="shine"></div><div class="text-sm font-semibold">${lang === 'CN' ? 'Git 工作流' : 'Git Workflow'}</div><div class="mt-1 text-xs dark:text-slate-400 text-slate-500">${lang === 'CN' ? '分支管理与协作规范。' : 'Branch management and collaboration.'}</div></a>
                <a class="doc-card p-5" href="#/doc-standards"><div class="shine"></div><div class="text-sm font-semibold">${lang === 'CN' ? '代码规范' : 'Coding Standards'}</div><div class="mt-1 text-xs dark:text-slate-400 text-slate-500">${lang === 'CN' ? 'Kotlin 编码风格与最佳实践。' : 'Kotlin style guide and best practices.'}</div></a>
              </div>
            </div>
          `;
        },
        'quick-5min': () => {
          return `
            <div class="doc-page">
              <div class="doc-prose">
                <h1>${lang === 'CN' ? '快速开始（开发）' : 'Quick Start (Dev)'}</h1>
                <p>${lang === 'CN' ? '本页直接接入项目的 BUILDING.md（编译指南）。如你只想“先跑起来”，优先按这里做。' : 'This page embeds BUILDING.md for building the project.'}</p>

                <div class="md-content" data-doc="BUILDING"></div>
              </div>

              <div class="doc-page-footer">
                <div class="text-center text-xs dark:text-slate-400 text-slate-500">关于：本页内容来自仓库文档，随项目更新。若发现步骤与实际不一致，请在 GitHub 提交 Issue/PR。</div>
              </div>
            </div>
          `;
        },
        'ui-buttons': () => {
          return `
            <div class="doc-prose">
              <h1>${lang === 'CN' ? '界面与按钮说明' : 'UI & Controls'}</h1>
              <p>${lang === 'CN' ? '本页帮助你快速认识 Aries AI 的关键界面：悬浮窗、日志、暂停/继续/停止等。' : 'Key UI elements: overlay, logs, pause/resume/stop.'}</p>
              ${imgSlot('quick-5min', 'overlay', lang === 'CN' ? '悬浮窗示意图（待补充）' : 'Overlay (placeholder)')}
              <h2>${lang === 'CN' ? '日志怎么看？' : 'How to read logs?'}</h2>
              <ul>
                <li>${lang === 'CN' ? '权限缺失：提示开启无障碍/悬浮窗/截图。' : 'Missing permissions: asks to enable accessibility/overlay/screenshot.'}</li>
                <li>${lang === 'CN' ? '页面变化：控件找不到，建议回到正确页面后重试。' : 'UI changed: element not found; navigate back and retry.'}</li>
              </ul>
            </div>
          `;
        },
        'model-key': () => {
          return `
            <div class="doc-prose">
              <h1>${lang === 'CN' ? '模型与 Key 配置' : 'Model & API Key'}</h1>
              <p>${lang === 'CN' ? '在此页面补充：支持的模型服务、Key 填写位置、网络要求与常见报错。' : 'Placeholder: providers, where to set key, network requirements, common errors.'}</p>
            </div>
          `;
        },
        'automation-permissions': () => {
          return `
            <div class="doc-prose">
              <h1>${lang === 'CN' ? '自动化能力与权限' : 'Automation & Permissions'}</h1>
              <p>${lang === 'CN' ? '说明三类关键权限：无障碍（必须）、悬浮窗（推荐）、截图（按需）。后续可补不同机型路径截图。' : 'Explain accessibility (required), overlay (recommended), screenshots (optional).'}
              </p>
              ${imgSlot('automation-permissions', 'accessibility', lang === 'CN' ? '无障碍开启路径（待补充）' : 'Accessibility path (placeholder)')}
              ${imgSlot('automation-permissions', 'screenshot', lang === 'CN' ? '截图权限路径（待补充）' : 'Screenshot permission (placeholder)')}
            </div>
          `;
        },
        'automation-accessibility': () => {
          return `
            <div class="doc-prose">
              <h1>${lang === 'CN' ? '无障碍开启指南（占位）' : 'Accessibility Guide (placeholder)'}</h1>
              <p>${lang === 'CN' ? '后续按手机厂商补齐：小米/华为/OPPO/VIVO/三星等。' : 'To be completed per OEM: Xiaomi/Huawei/OPPO/VIVO/Samsung...'}
              </p>
            </div>
          `;
        },
        'dev-contribute': () => {
          return `
            <div class="doc-prose">
              <h1>${lang === 'CN' ? '开发 / 共创' : 'Dev / Co-Create'}</h1>
              <p>${lang === 'CN' ? '此页面入口已从网站导航隐藏（后续接入共创体系时再开放）。' : 'This entry is hidden from nav for now.'}</p>
            </div>
          `;
        },
        'doc-technical': () => docPage('技术概览（TECHNICAL_OVERVIEW）', 'Technical Overview', 'TECHNICAL_OVERVIEW'),
        'doc-building': () => docPage('构建指南（BUILDING）', 'Building Guide', 'BUILDING'),
        'doc-workflow': () => docPage('工作流（GIT_WORKFLOW）', 'Git Workflow', 'GIT_WORKFLOW'),
        'doc-standards': () => docPage('代码规范（CODING_STANDARDS）', 'Coding Standards', 'CODING_STANDARDS'),
        'doc-feishu': () => docPage('飞书协作（FEISHU）', 'Feishu Collaboration', 'FEISHU_COLLABORATION'),
        faq: () => docPage('常见问题 Q&A', 'FAQ', 'FAQ'),
      };

      function getRoute() {
        const raw = (location.hash || '').trim();
        const m = raw.match(/^#\/(.+)$/);
        return m && m[1] ? m[1] : 'home';
      }

      function bindImgSlots() {
        contentEl.querySelectorAll('[data-img-src]')
          .forEach((el) => {
            el.addEventListener('click', () => {
              const src = el.getAttribute('data-img-src') || '';
              const alt = el.getAttribute('data-img-alt') || '';
              if (!src) return;
              openLightbox(src, alt);
            });
          });
      }

      async function render() {
        buildNav();
        const route = getRoute();
        const page = PAGES[route] || PAGES.home;
        contentEl.innerHTML = page();
        const docEls = Array.from(contentEl.querySelectorAll('[data-doc]'));
        await Promise.all(docEls.map(async (el) => {
          const docName = el.getAttribute('data-doc') || '';
          if (!docName) return;
          try {
            el.textContent = '加载中...';
            const txt = await loadDocText(docName);
            if (window.marked && typeof window.marked.parse === 'function') {
              el.innerHTML = window.marked.parse(txt);
              postProcessMarkdown(el);
            } else {
              el.textContent = txt;
            }
          } catch (err) {
            el.textContent = '文档加载失败：' + (err && err.message ? err.message : String(err));
          }
        }));
        bindImgSlots();
      }

      window.addEventListener('hashchange', render);
      render();
    })();
  </script>
</body>
